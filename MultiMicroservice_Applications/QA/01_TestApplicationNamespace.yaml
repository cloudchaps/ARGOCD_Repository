apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: 
  name: namespaceandsecrets
  labels:
    owner: cloudchaps
    env: dev
  namespace: argocd
spec: 
  destination: 
    namespace: qa-remote-cluster
    server: "https://843B2BB2F606482A6D37E09A4E6B2276.gr7.us-east-1.eks.amazonaws.com"
  project: default
  
  source: 
    path: Kubernetes_Manifest_Files/01-Frontend/QA
    repoURL: "https://github.com/cloudchaps/ARGOCD_Repository.git"
    targetRevision: main
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - ApplyOutOfSyncOnly=true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microservices-app
  namespace: argocd
spec:
  project: default

  destination:
    server: "https://kubernetes.default.svc"
    namespace: microservices

  sources:
  
  - repoURL: "https://github.com/cloudchaps/ARGOCD_Repository.git"
    targetRevision: main
    path: Kubernetes_Manifest_Files/01-Frontend/01-NGINX_Service

  - repoURL: "https://github.com/cloudchaps/ARGOCD_Repository.git"
    targetRevision: main
    path: Kubernetes_Manifest_Files/01-Frontend/02-Angular_Client

  - repoURL: "https://github.com/cloudchaps/ARGOCD_Repository.git"
    targetRevision: main
    path: Kubernetes_Manifest_Files/01-Frontend/03-NodeJS_API

  - repoURL: "https://github.com/cloudchaps/ARGOCD_Repository.git"
    targetRevision: main
    path: Kubernetes_Manifest_Files/01-Frontend/04-JAVA_API

  - repoURL: "https://github.com/cloudchaps/ARGOCD_Repository.git"
    targetRevision: main
    path: Kubernetes_Manifest_Files/02-Backend/01-MONGODB

  - repoURL: "https://github.com/cloudchaps/ARGOCD_Repository.git"
    targetRevision: main
    path: Kubernetes_Manifest_Files/02-Backend/02-MYSQL

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata: 
  name: mongodb
  namespace: argocd
spec: 
  destination: 
    namespace: emartapp-application
    server: "https://kubernetes.default.svc"
  project: default
  
  source: 
    path: Kubernetes_Manifest_Files/02-Backend/01-MONGODB
    repoURL: "https://github.com/cloudchaps/ARGOCD_Repository.git"
    targetRevision: main
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
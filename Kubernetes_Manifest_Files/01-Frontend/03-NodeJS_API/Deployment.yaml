apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapi-service
  namespace: emartapp-application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodeapi-service
  template:
    metadata:
      labels:
        app: nodeapi-service
    spec:
      containers:
      - name: nodeapi-service
        image: darosa87/emartnodeapi
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: mongodb://admin:example@emongo:27017/appdb?authSource=admin
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: emartapp-application
spec:
  replicas: 2

  selector:
    matchLabels:
      app: mongo

  template:
    metadata:
      labels:
        app: mongo

    spec:
      containers:
      - name: mongo
        image: mongo:4

        ports:
        - containerPort: 27017

        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: admin

        - name: MONGO_INITDB_ROOT_PASSWORD
          value: example

        - name: MONGO_INITDB_DATABASE
          value: epoc

        volumeMounts:
        - name: mongo-init-volume
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: mongo-init-volume
        configMap:
          name: mongo-init-script